#  ---- exam-system role ----
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: exam-admin-role
  namespace: exam-system
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
#  ---- exam-system service account ----
apiVersion: v1
kind: ServiceAccount
metadata:
  name: exam-admin
  namespace: exam-system
---
#  ---- exam-system role binding ----
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: exam-admin-binding
  namespace: exam-system
subjects:
- kind: ServiceAccount
  name: exam-admin
  namespace: exam-system
roleRef:
  kind: Role
  name: exam-admin-role
  apiGroup: rbac.authorization.k8s.io