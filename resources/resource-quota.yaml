# laci kvótája
apiVersion: v1
kind: ResourceQuota
metadata:
  name: student-quota
  namespace: student-laci
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 256Mi
    limits.cpu: "1"
    limits.memory: 512Mi
    pods: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: student-limitrange
  namespace: student-laci
spec:
  limits:
  - type: Container
    default:
      cpu: 200m
      memory: 128Mi
    defaultRequest:
      cpu: 100m
      memory: 64Mi
    max:
      cpu: "500m"
      memory: 256Mi
---
