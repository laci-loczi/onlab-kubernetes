# ---- exam-system kvotaja ----
apiVersion: v1
kind: ResourceQuota
metadata:
  name: exam-system-quota
  namespace: exam-system
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 1Gi
    limits.cpu: "4"
    limits.memory: 2Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: exam-system-limitrange
  namespace: exam-system
spec:
  limits:
  - type: Container
    default:
      cpu: 500m
      memory: 256Mi
    defaultRequest:
      cpu: 200m
      memory: 128Mi
    max:
      cpu: "2"
      memory: 1Gi