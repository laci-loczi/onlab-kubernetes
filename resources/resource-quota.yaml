# =============================================================
# 4-resource-quota.yaml
# ResourceQuota + LimitRange minden hallgatoi namespace-hez,
# es az exam-system-hez is.
#
# ResourceQuota: namespace szintu globalis limit
# LimitRange:    egyes Podok / kontenerek szintu alapertelmezesek
# =============================================================

# ---- laci kvotaja ----
apiVersion: v1
kind: ResourceQuota
metadata:
  name: student-quota
  namespace: student-laci
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 256Mi
    limits.cpu: "1"
    limits.memory: 512Mi
    pods: "5"
    services.nodeports: "0"
    services.loadbalancers: "0"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: student-limitrange
  namespace: student-laci
spec:
  limits:
  - type: Container
    default:
      cpu: 200m
      memory: 128Mi
    defaultRequest:
      cpu: 100m
      memory: 64Mi
    max:
      cpu: "500m"
      memory: 256Mi
    min:
      cpu: "50m"
      memory: 32Mi

---
